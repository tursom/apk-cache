name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  GO_VERSION: '1.25'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binary:
    name: Build Binary (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
        include:
          - os: linux
            arch: 386
          - os: windows
            arch: 386

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Node.js and html-minifier
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-minifier
        run: npm install -g html-minifier

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          cd cmd/apk-cache

          # Compress admin.html
          ADMIN_HTML="admin.html"
          ADMIN_MIN_HTML="admin_min.html"

          if [ -f "$ADMIN_HTML" ]; then
            # Simple compression using perl
            perl -pe 's/^\s+//g; s/\s+$//g; s/>\s+</></g' "$ADMIN_HTML" > "$ADMIN_MIN_HTML"

            # Create gzip version
            gzip -9 -c "$ADMIN_MIN_HTML" > "${ADMIN_MIN_HTML}.gz"
          fi

          # Build
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi

          OUTPUT_NAME="apk-cache-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags="-s -w" -trimpath -o "$OUTPUT_NAME" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-cache-${{ matrix.os }}-${{ matrix.arch }}
          path: cmd/apk-cache/apk-cache-*
          retention-days: 5

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-binary
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Node.js for build.sh
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-minifier
        run: npm install -g html-minifier

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:test
          platforms: |
            linux/amd64
          load: true

      - name: Run tests
        run: |
          # Run the test script with the built image
          ./run_test.sh --image ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:test

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: |
            linux/amd64
            linux/arm64
            linux/386
            linux/arm/v7
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binary, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
