# APK Cache v2 example configuration

[server]
listen = ":3142"

[[upstreams]]
name = "Official Alpine CDN"
url = "https://dl-cdn.alpinelinux.org"
kind = "apk"

[[upstreams]]
name = "TUNA Alpine Mirror"
url = "https://mirrors.tuna.tsinghua.edu.cn/alpine"
kind = "apk"
# proxy = "socks5://127.0.0.1:1080"

[cache]
root = "./cache"
data_root = "./data"
index_ttl = "24h"
package_ttl = "720h"

[cache.memory]
enabled = true
max_size = "256MB"
max_item_size = "16MB"
ttl = "30m"
max_items = 2048

[transport]
timeout = "30s"
idle_conn_timeout = "90s"
max_idle_conns = 128

[apk]
enabled = true

[apt]
enabled = true
verify_hash = true
load_index_async = true

[proxy]
enabled = true
allow_connect = true
cache_non_package_requests = false
require_auth = false
# allowed_hosts = ["deb.debian.org", "security.debian.org"]
